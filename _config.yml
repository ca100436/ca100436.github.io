title: "유성윤"
description: "Future Backend Developer"
url: "https://ca100436.github.io"
baseurl: ""
repository: "ca100436/ca100436.github.io"

remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"

search: true
locale: "ko-KR"
timezone: "Asia/Seoul"
markdown: kramdown

author:
  name: "Yu Sungyoon"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "Computer Science Student | Future Backend Developer"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ca100436"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://www.instagram.com/sungyoon8876/"

plugins:
  - jekyll-include-cache
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate

include:
  - _pages

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

paginate: 5
paginate_path: /page:num/
timezone: Asia/Seoul
markdown: kramdown
